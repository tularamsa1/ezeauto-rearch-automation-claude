# action_registry.yaml
# --------------------
# Maps natural language test step patterns to PageFactory method calls.
# Used by Claude (via the test_generator.md skill) to convert human-readable
# test steps into executable Python automation code.
#
# Pattern syntax:
#   - Literal text is matched case-insensitively
#   - {param_name} captures a value to pass as a method argument
#   - Multiple patterns per action allow flexible phrasing
#
# To extend: add new entries when new PageFactory methods are created.

package: com.razorpay.pos
app_name: ReArch

# ── Synonyms ─────────────────────────────────────────────────────────────────
# Expands NL pattern coverage without adding duplicate pattern entries.
# The test_generator.md workflow uses these to match step phrasings that don't
# appear verbatim in the patterns lists above.
synonyms:
  enter:  [input, type, key in, set, fill, put, add, specify]
  click:  [tap, press, select, choose, hit]
  verify: [validate, check, assert, confirm, ensure]
  amount: [price, value, sum, figure, total]
  go_to:  [navigate to, open, visit, access]
  wait:   [wait for, expect, ensure loaded]

page_objects:
  ReArchLoginPage:
    import: "from PageFactory.ReArch.rearch_login_page import ReArchLoginPage"
    init: "login_page = ReArchLoginPage(driver)"
  ReArchHomePage:
    import: "from PageFactory.ReArch.rearch_home_page import ReArchHomePage"
    init: "home_page = ReArchHomePage(driver)"
  ReArchQRPage:
    import: "from PageFactory.ReArch.rearch_qr_page import ReArchQRPage"
    init: "qr_page = ReArchQRPage(driver)"
  ReArchCompletePage:
    import: "from PageFactory.ReArch.rearch_complete_page import ReArchCompletePage"
    init: "complete_page = ReArchCompletePage(driver)"
  ReArchTxnHistoryPage:
    import: "from PageFactory.ReArch.rearch_txn_history_page import ReArchTxnHistoryPage"
    init: "txn_history_page = ReArchTxnHistoryPage(driver)"
  ReArchTxnDetailPage:
    import: "from PageFactory.ReArch.rearch_txn_detail_page import ReArchTxnDetailPage"
    init: "txn_detail_page = ReArchTxnDetailPage(driver)"
  ReArchPaymentMethodPage:
    import: "from PageFactory.ReArch.rearch_payment_method_page import ReArchPaymentMethodPage"
    init: "payment_method_page = ReArchPaymentMethodPage(driver)"
  ReArchCashConfirmPage:
    import: "from PageFactory.ReArch.rearch_cash_confirm_page import ReArchCashConfirmPage"
    init: "cash_confirm_page = ReArchCashConfirmPage(driver)"
  ReArchOrderDetailsPage:
    import: "from PageFactory.ReArch.rearch_order_details_page import ReArchOrderDetailsPage"
    init: "order_details_page = ReArchOrderDetailsPage(driver)"
  ReArchCardTypePage:
    import: "from PageFactory.ReArch.rearch_card_type_page import ReArchCardTypePage"
    init: "card_type_page = ReArchCardTypePage(driver)"
  ReArchChequePage:
    import: "from PageFactory.ReArch.rearch_cheque_page import ReArchChequePage"
    init: "cheque_page = ReArchChequePage(driver)"
  ReArchDemandDraftPage:
    import: "from PageFactory.ReArch.rearch_demand_draft_page import ReArchDemandDraftPage"
    init: "dd_page = ReArchDemandDraftPage(driver)"
  ReArchTipPage:
    import: "from PageFactory.ReArch.rearch_tip_page import ReArchTipPage"
    init: "tip_page = ReArchTipPage(driver)"
  ReArchEMIPage:
    import: "from PageFactory.ReArch.rearch_emi_page import ReArchEMIPage"
    init: "emi_page = ReArchEMIPage(driver)"
  ReArchAccountDetailsPage:
    import: "from PageFactory.ReArch.rearch_account_details_page import ReArchAccountDetailsPage"
    init: "account_page = ReArchAccountDetailsPage(driver)"

actions:

  # ── App launch / login ──────────────────────────────────────────────────

  - patterns:
      - "open rearch"
      - "launch rearch"
      - "open app"
      - "launch app"
      - "start app"
    page: ReArchLoginPage
    method: wait_for_login_page
    code: "login_page.wait_for_login_page()"
    description: "Wait for the ReArch app login page to be ready"

  - patterns:
      - "login"
      - "login with credentials"
      - "enter credentials"
      - "sign in"
      - "perform login"
    page: ReArchLoginPage
    method: perform_login
    params: [username, password]
    code: "login_page.perform_login(username, password)"
    description: "Enter username and password, then click Login"

  - patterns:
      - "enter username {username}"
      - "type username {username}"
    page: ReArchLoginPage
    method: enter_username
    params: [username]
    code: "login_page.enter_username(\"{username}\")"

  - patterns:
      - "enter password {password}"
      - "type password {password}"
    page: ReArchLoginPage
    method: enter_password
    params: [password]
    code: "login_page.enter_password(\"{password}\")"

  - patterns:
      - "click login"
      - "tap login"
      - "press login"
    page: ReArchLoginPage
    method: click_login
    code: "login_page.click_login()"

  - patterns:
      - "validate login page"
      - "verify login page"
      - "check login page"
    page: ReArchLoginPage
    method: validate_login_page
    code: "login_page.validate_login_page()"

  # ── Initial home screen (post-login dashboard) ───────────────────────────

  - patterns:
      - "wait for initial home screen"
      - "wait for home screen"
      - "initial home screen loaded"
    page: ReArchHomePage
    method: wait_for_initial_home_screen
    code: "home_page.wait_for_initial_home_screen()"
    description: "Wait for the post-login home screen (Collect Payment button visible)"

  - patterns:
      - "click collect payment"
      - "tap collect payment"
      - "select collect payment"
    page: ReArchHomePage
    method: click_collect_payment
    code: "home_page.click_collect_payment()"
    priority: 1
    description: "Tap the Collect Payment button on the initial home screen"

  # ── Home / Amount page ──────────────────────────────────────────────────

  - patterns:
      - "wait for home page"
      - "wait for amount page"
      - "home page loaded"
    page: ReArchHomePage
    method: wait_for_home_page_load
    code: "home_page.wait_for_home_page_load()"

  - patterns:
      - "enter amount {amount}"
      - "type amount {amount}"
      - "key in {amount}"
      - "input amount {amount}"
      - "enter {amount}"
    page: ReArchHomePage
    method: enter_amount
    params: [amount]
    code: "home_page.enter_amount(\"{amount}\")"
    description: "Enter an amount using the on-screen numpad"

  - patterns:
      - "clear amount"
      - "reset amount"
    page: ReArchHomePage
    method: clear_amount
    code: "home_page.clear_amount()"

  - patterns:
      - "click more payment options"
      - "tap more payment options"
      - "click overlay button"
      - "tap ellipsis"
    page: ReArchHomePage
    method: click_more_payment_options
    code: "home_page.click_more_payment_options()"
    description: "Tap the ⋯ button beside UPI to open the full payment method overlay"

  - patterns:
      - "click upi"
      - "select upi"
      - "pay by upi"
      - "upi payment"
      - "tap upi"
    page: ReArchHomePage
    method: click_pay_by_upi
    code: "home_page.click_pay_by_upi()"
    priority: 1

  - patterns:
      - "click card"
      - "select card"
      - "pay by card"
      - "card payment"
      - "tap card"
    page: ReArchHomePage
    method: click_pay_by_card
    code: "home_page.click_pay_by_card()"
    preconditions:
      org_settings:
        cardEnabled: "true"
      revert_on_finally:
        cardEnabled: "false"

  - patterns:
      - "click add tip"
      - "add tip"
      - "tap add tip"
    page: ReArchHomePage
    method: click_add_tip
    code: "home_page.click_add_tip()"

  - patterns:
      - "click menu"
      - "open menu"
      - "tap menu"
    page: ReArchHomePage
    method: click_menu
    code: "home_page.click_menu()"

  - patterns:
      - "go to transaction history"
      - "open transactions"
      - "view transactions"
      - "click transaction history"
      - "open transaction history"
    page: ReArchHomePage
    method: click_txn_history
    code: "home_page.click_txn_history()"

  - patterns:
      - "enter amount {amount} and pay by upi"
      - "enter {amount} and select upi"
    page: ReArchHomePage
    method: enter_amount_and_proceed_upi
    params: [amount]
    code: "home_page.enter_amount_and_proceed_upi(\"{amount}\")"

  - patterns:
      - "enter amount {amount} and pay by card"
      - "enter {amount} and select card"
    page: ReArchHomePage
    method: enter_amount_and_proceed_card
    params: [amount]
    code: "home_page.enter_amount_and_proceed_card(\"{amount}\")"

  - patterns:
      - "click cash"
      - "select cash"
      - "pay by cash"
      - "cash payment"
      - "tap cash"
    page: ReArchHomePage
    method: click_pay_by_cash
    code: "home_page.click_pay_by_cash()"
    priority: 1
    preconditions:
      org_settings:
        cashEnabled: "true"
      revert_on_finally:
        cashEnabled: "false"

  - patterns:
      - "enter amount {amount} and pay by cash"
      - "enter {amount} and select cash"
    page: ReArchHomePage
    method: enter_amount_and_proceed_cash
    params: [amount]
    code: "home_page.enter_amount_and_proceed_cash(\"{amount}\")"

  # ── Order Details overlay ────────────────────────────────────────────────

  - patterns:
      - "wait for order details"
      - "order details screen displayed"
      - "verify order details screen"
    page: ReArchOrderDetailsPage
    method: wait_for_order_details_screen
    code: "order_details_page.wait_for_order_details_screen()"
    description: "Wait for the Order Details overlay to appear"

  - patterns:
      - "enter order id {order_id}"
      - "type order id {order_id}"
    page: ReArchOrderDetailsPage
    method: enter_order_id
    params: [order_id]
    code: "order_details_page.enter_order_id(\"{order_id}\")"

  - patterns:
      - "click proceed on order details"
      - "click proceed"
      - "tap proceed"
      - "proceed with order details"
    page: ReArchOrderDetailsPage
    method: click_proceed
    code: "order_details_page.click_proceed()"
    priority: 1

  - patterns:
      - "cancel order details"
      - "click cancel on order details"
    page: ReArchOrderDetailsPage
    method: click_cancel
    code: "order_details_page.click_cancel()"

  # ── Payment method overlay ───────────────────────────────────────────────

  - patterns:
      - "wait for payment methods"
      - "payment methods displayed"
      - "verify payment method overlay"
    page: ReArchPaymentMethodPage
    method: wait_for_payment_methods
    code: "payment_method_page.wait_for_payment_methods()"

  - patterns:
      - "select cash from payment methods"
      - "click cash in overlay"
      - "choose cash"
    page: ReArchPaymentMethodPage
    method: click_cash
    code: "payment_method_page.click_cash()"
    priority: 2
    preconditions:
      org_settings:
        cashEnabled: "true"
      revert_on_finally:
        cashEnabled: "false"

  - patterns:
      - "select upi from payment methods"
      - "click upi in overlay"
    page: ReArchPaymentMethodPage
    method: click_upi
    code: "payment_method_page.click_upi()"

  - patterns:
      - "select card from payment methods"
      - "click card in overlay"
    page: ReArchPaymentMethodPage
    method: click_card
    code: "payment_method_page.click_card()"
    preconditions:
      org_settings:
        cardEnabled: "true"
      revert_on_finally:
        cardEnabled: "false"

  - patterns:
      - "select payment link"
      - "click payment link"
    page: ReArchPaymentMethodPage
    method: click_payment_link
    code: "payment_method_page.click_payment_link()"

  - patterns:
      - "select bharat qr"
      - "click bharat qr"
    page: ReArchPaymentMethodPage
    method: click_bharat_qr
    code: "payment_method_page.click_bharat_qr()"

  - patterns:
      - "select cheque"
      - "click cheque"
      - "pay by cheque"
    page: ReArchPaymentMethodPage
    method: click_cheque
    code: "payment_method_page.click_cheque()"

  - patterns:
      - "select demand draft"
      - "click demand draft"
      - "pay by demand draft"
    page: ReArchPaymentMethodPage
    method: click_demand_draft
    code: "payment_method_page.click_demand_draft()"

  - patterns:
      - "is cash available"
      - "check if cash is available"
    page: ReArchPaymentMethodPage
    method: is_cash_available
    code: "assert payment_method_page.is_cash_available(), \"Cash payment method is not available\""
    returns: bool

  # ── Cash confirmation screen ─────────────────────────────────────────────

  - patterns:
      - "wait for cash confirm"
      - "cash confirm screen displayed"
      - "verify cash confirmation"
    page: ReArchCashConfirmPage
    method: wait_for_cash_confirm_screen
    code: "cash_confirm_page.wait_for_cash_confirm_screen()"

  - patterns:
      - "confirm cash payment"
      - "click confirm payment"
      - "tap confirm payment"
      - "confirm cash"
    page: ReArchCashConfirmPage
    method: click_confirm_payment
    code: "cash_confirm_page.click_confirm_payment()"

  - patterns:
      - "wait and confirm cash"
      - "confirm cash payment flow"
    page: ReArchCashConfirmPage
    method: wait_and_confirm_cash_payment
    code: "cash_confirm_page.wait_and_confirm_cash_payment()"

  # ── eSignature screen ─────────────────────────────────────────────────────

  - patterns:
      - "wait for esignature screen"
      - "esignature screen displayed"
    page: ReArchESignaturePage
    method: wait_for_esignature_screen
    code: "esignature_page.wait_for_esignature_screen()"

  - patterns:
      - "draw signature"
      - "sign on screen"
      - "draw esignature"
    page: ReArchESignaturePage
    method: draw_signature
    code: "esignature_page.draw_signature(271, 588, 441, 555)"
    description: "Draw a signature by swiping between coordinates on the eSignature screen"

  - patterns:
      - "agree to save signature"
      - "click agree signature"
      - "i agree to securely save my signature"
    page: ReArchESignaturePage
    method: click_agree_signature
    code: "esignature_page.click_agree_signature()"

  - patterns:
      - "click proceed on esignature"
      - "proceed after signature"
    page: ReArchESignaturePage
    method: click_proceed
    code: "esignature_page.click_proceed()"

  - patterns:
      - "confirm payment after esignature"
      - "click confirm payment esignature"
    page: ReArchESignaturePage
    method: click_confirm_payment
    code: "esignature_page.click_confirm_payment()"

  # ── Card type selection screen ────────────────────────────────────────────

  - patterns:
      - "wait for card type screen"
      - "card type selection screen displayed"
      - "verify card type selection screen"
    page: ReArchCardTypePage
    method: wait_for_card_type_screen
    code: "card_type_page.wait_for_card_type_screen()"
    description: "Wait for the card type selection (DUMMY simulator) screen to appear"

  - patterns:
      - "select card type {card_name}"
      - "click card type {card_name}"
      - "choose card type {card_name}"
    page: ReArchCardTypePage
    method: select_card_type
    params: [card_name]
    code: "card_type_page.select_card_type(\"{card_name}\")"
    description: "Select a specific card type by display name (e.g. 'Visa Debit (EMV)')"

  - patterns:
      - "select visa debit emv"
      - "click visa debit emv"
      - "choose visa debit emv"
    page: ReArchCardTypePage
    method: click_visa_debit_emv
    code: "card_type_page.click_visa_debit_emv()"
    description: "Select Visa Debit (EMV) from the card type list"

  - patterns:
      - "select visa debit contactless"
      - "click visa debit contactless"
    page: ReArchCardTypePage
    method: click_visa_debit_contactless
    code: "card_type_page.click_visa_debit_contactless()"

  - patterns:
      - "select visa credit emv"
      - "click visa credit emv"
    page: ReArchCardTypePage
    method: click_visa_credit_emv
    code: "card_type_page.click_visa_credit_emv()"

  - patterns:
      - "select mastercard debit emv"
      - "click mastercard debit emv"
    page: ReArchCardTypePage
    method: click_mastercard_debit_emv
    code: "card_type_page.click_mastercard_debit_emv()"

  - patterns:
      - "select rupay debit emv"
      - "click rupay debit emv"
    page: ReArchCardTypePage
    method: click_rupay_debit_emv
    code: "card_type_page.click_rupay_debit_emv()"

  # ── QR / UPI payment screen ────────────────────────────────────────────

  - patterns:
      - "wait for qr screen"
      - "qr screen displayed"
      - "verify qr screen"
      - "qr code visible"
    page: ReArchQRPage
    method: wait_for_qr_screen
    code: "qr_page.wait_for_qr_screen()"

  - patterns:
      - "validate qr screen"
      - "verify qr page"
    page: ReArchQRPage
    method: validate_qr_screen
    code: "qr_page.validate_qr_screen()"

  - patterns:
      - "cancel payment"
      - "cancel the payment"
      - "abort payment"
    page: ReArchQRPage
    method: cancel_payment
    code: "qr_page.cancel_payment()"

  # ── Payment result screen ──────────────────────────────────────────────

  - patterns:
      - "verify success"
      - "verify payment success"
      - "payment successful"
      - "check success screen"
      - "wait for success"
      - "verify success screen"
    page: ReArchCompletePage
    method: wait_for_success_screen
    code: "complete_page.wait_for_success_screen()"

  - patterns:
      - "verify failure"
      - "verify payment failed"
      - "payment failed"
      - "check failure screen"
      - "wait for failure"
    page: ReArchCompletePage
    method: wait_for_failure_screen
    code: "complete_page.wait_for_failure_screen()"

  - patterns:
      - "is payment successful"
      - "check if successful"
    page: ReArchCompletePage
    method: is_payment_successful
    code: "assert complete_page.is_payment_successful(), \"Payment was not successful\""
    returns: bool

  - patterns:
      - "is payment failed"
      - "check if failed"
    page: ReArchCompletePage
    method: is_payment_failed
    code: "assert complete_page.is_payment_failed(), \"Payment did not fail as expected\""
    returns: bool

  - patterns:
      - "view payment details"
      - "open view details"
      - "click view details"
    page: ReArchCompletePage
    method: open_view_details
    code: "complete_page.open_view_details()"

  - patterns:
      - "fetch all payment details"
      - "get payment details"
    page: ReArchCompletePage
    method: fetch_all_details
    code: "payment_details = complete_page.fetch_all_details()"
    returns: dict

  - patterns:
      - "go back to home"
      - "accept more payments"
      - "proceed to home"
      - "click accept more payments"
      - "back to home"
    page: ReArchCompletePage
    method: click_proceed_to_home
    code: "complete_page.click_proceed_to_home()"

  - patterns:
      - "retry payment"
      - "click retry"
    page: ReArchCompletePage
    method: click_retry
    code: "complete_page.click_retry()"

  - patterns:
      - "print receipt"
      - "click print receipt"
    page: ReArchCompletePage
    method: click_print_receipt
    code: "complete_page.click_print_receipt()"

  - patterns:
      - "send e-receipt"
      - "send ereceipt"
      - "click send e-receipt"
    page: ReArchCompletePage
    method: click_send_e_receipt
    code: "complete_page.click_send_e_receipt()"

  # ── Transaction history ────────────────────────────────────────────────

  - patterns:
      - "wait for transaction list"
      - "transaction list loaded"
      - "verify transaction history"
    page: ReArchTxnHistoryPage
    method: wait_for_txn_list
    code: "txn_history_page.wait_for_txn_list()"

  - patterns:
      - "click transaction with {method} and amount {amount}"
      - "select {method} transaction for {amount}"
    page: ReArchTxnHistoryPage
    method: click_txn_by_method_and_amount
    params: [method, amount]
    code: "txn_history_page.click_txn_by_method_and_amount(\"{method}\", \"{amount}\")"

  - patterns:
      - "click first transaction"
      - "select first transaction"
      - "open first transaction"
    page: ReArchTxnHistoryPage
    method: click_first_transaction
    code: "txn_history_page.click_first_transaction()"

  - patterns:
      - "click transaction by txn id {txn_id}"
      - "open transaction by txn id {txn_id}"
      - "search and open transaction {txn_id}"
    page: ReArchTxnHistoryPage
    method: click_on_transaction_by_txn_id
    params: [txn_id]
    code: "txn_history_page.click_on_transaction_by_txn_id(txn_id=txn_id)"
    description: "Search by Payment ID and open the matching transaction row"

  - patterns:
      - "click search in history"
      - "search transactions"
      - "open search"
    page: ReArchTxnHistoryPage
    method: click_search
    code: "txn_history_page.click_search()"

  - patterns:
      - "click my dashboard"
      - "open dashboard"
    page: ReArchTxnHistoryPage
    method: click_my_dashboard
    code: "txn_history_page.click_my_dashboard()"

  # ── Transaction history filters ──────────────────────────────────────────

  - patterns:
      - "click method filter"
      - "click filter method"
      - "tap method filter"
    page: ReArchTxnHistoryPage
    method: click_filter_method
    code: "txn_history_page.click_filter_method()"
    description: "Click the Method filter chip on the transaction history page"

  - patterns:
      - "click status filter"
      - "click filter status"
      - "tap status filter"
    page: ReArchTxnHistoryPage
    method: click_filter_status
    code: "txn_history_page.click_filter_status()"
    description: "Click the Status filter chip on the transaction history page"

  - patterns:
      - "click date filter"
      - "click filter date"
      - "tap date filter"
    page: ReArchTxnHistoryPage
    method: click_filter_date
    code: "txn_history_page.click_filter_date()"
    description: "Click the Date filter chip on the transaction history page"

  - patterns:
      - "select filter option {option}"
      - "click filter option {option}"
      - "choose filter {option}"
    page: ReArchTxnHistoryPage
    method: select_filter_option
    params: [option]
    code: "txn_history_page.select_filter_option(\"{option}\")"
    description: "Select a filter option from the filter dropdown (e.g., 'Cash', 'Settled')"

  - patterns:
      - "click apply filter"
      - "tap apply filter"
      - "apply filter"
    page: ReArchTxnHistoryPage
    method: click_apply_filter
    code: "txn_history_page.click_apply_filter()"
    description: "Click the Apply button in the filter dropdown"

  - patterns:
      - "verify filter text {text} is displayed"
      - "check filter text {text} is present"
      - "is filter {text} visible"
    page: ReArchTxnHistoryPage
    method: is_filter_text_displayed
    params: [text]
    code: "assert txn_history_page.is_filter_text_displayed(\"{text}\"), \"Expected filter text '{text}' not displayed\""
    returns: bool
    description: "Verify a filter text/chip is displayed on the transaction history page"

  # ── Transaction detail ─────────────────────────────────────────────────

  - patterns:
      - "wait for transaction detail"
      - "transaction detail loaded"
      - "verify transaction detail page"
    page: ReArchTxnDetailPage
    method: wait_for_detail_page
    code: "txn_detail_page.wait_for_detail_page()"

  - patterns:
      - "fetch transaction status"
      - "get transaction status"
    page: ReArchTxnDetailPage
    method: fetch_status
    code: "txn_status = txn_detail_page.fetch_status()"
    returns: str

  - patterns:
      - "fetch payment id"
      - "get payment id"
      - "fetch txn id"
      - "get txn id"
    page: ReArchTxnDetailPage
    method: fetch_payment_id
    code: "payment_id = txn_detail_page.fetch_payment_id()"
    returns: str

  - patterns:
      - "fetch rrn"
      - "get rrn"
      - "get rrn number"
    page: ReArchTxnDetailPage
    method: fetch_rrn
    code: "rrn = txn_detail_page.fetch_rrn()"
    returns: str

  - patterns:
      - "fetch date time"
      - "fetch transaction time"
      - "get date time"
      - "get transaction time"
      - "fetch date and time"
    page: ReArchTxnDetailPage
    method: fetch_date_time
